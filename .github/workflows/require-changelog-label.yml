name: Require Changelog Label
on:
  pull_request_target:
    types: [opened, labeled, unlabeled, synchronize]
    branches:
      - "master"
jobs:
  label:
    if: ${{ github.repository_owner == 'jenkinsci' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: mheap/github-action-required-labels@0ac283b4e65c1fb28ce6079dea5546ceca98ccbe # v5.5.2
        with:
          mode: minimum
          count: 1
          add_comment: true
          message: "Missing required label for changelog. Requires {{errorString}} {{count}} of: {{ provided }}. Found: {{ applied }}.\n\nYou can add the required label by adding a comment with the following text: `/label <category>`"
          labels: |
            bug
            developer
            dependencies
            internal
            localization
            major-bug
            major-rfe
            rfe
            regression-fix
            removed
            skip-changelog
